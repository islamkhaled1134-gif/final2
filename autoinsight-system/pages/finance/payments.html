<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Finance Payments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="vms-app">
    <nav class="sidebar">
        <a href="../../index.html" class="brand"><i class="bi bi-car-front-fill" style="color:#818cf8;"></i>
            AutoInsight</a>
        <div class="sidebar-heading">Finance</div>
        <ul class="sidebar-menu">
            <li><a href="./finance-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="./invoices.html"><i class="bi bi-receipt"></i> Invoices</a></li>
            <li class="active"><a href="./payments.html"><i class="bi bi-credit-card"></i> Payments</a></li>
            <li><a href="./reports.html"><i class="bi bi-bar-chart"></i> Reports</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold">Finance Payments</h5>
            </div>
            <div class="ms-auto"><button id="themeSwitch" class="btn btn-outline-secondary rounded-circle"
                    style="width:38px;height:38px;padding:0;"><i class="bi bi-moon-stars"></i></button></div>
        </header>
        <div class="container-fluid p-4 fade-in">
            <div class="dashboard-header">
                <div>
                    <span class="dashboard-breadcrumbs">Finance / Payments</span>
                    <h1 class="dashboard-title">Payment Records</h1>
                </div>
                <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-download me-1"></i> Export CSV</button>
            </div>
            <div class="card border-0 rounded-4">
                <div
                    class="card-header bg-transparent border-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold mb-0">All Payments</h6>
                    <div class="d-flex gap-2">
                        <input type="text" class="form-control form-control-sm"
                            style="width:200px;background:rgba(255,255,255,.05);border-color:var(--border-color);"
                            placeholder="Search...">
                        <select class="form-select form-select-sm"
                            style="width:140px;background:rgba(255,255,255,.05);border-color:var(--border-color);">
                            <option>All Methods</option>
                            <option>Card</option>
                            <option>Cash</option>
                            <option>Instalment</option>
                        </select>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Payment ID</th>
                                    <th>Client</th>
                                    <th>Invoice</th>
                                    <th>Amount</th>
                                    <th>Method</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="paymentsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        const s = JSON.parse(localStorage.getItem('autoinsight_v1') || '{}');
        const payments = s.payments || [
            { id: 'PAY-001', client: 'Jane Doe', invoice: 'INV-2001', amount: 104.50, method: 'Card', date: '2026-02-28', status: 'Settled' },
        ];
        const tbody = document.getElementById('paymentsTableBody');
        if (payments.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No payments recorded.</td></tr>';
        } else {
            tbody.innerHTML = payments.map(p => `
        <tr>
          <td class="fw-bold">${p.id}</td>
          <td>${p.client}</td>
          <td>${p.invoice}</td>
          <td class="fw-bold text-success">$${Number(p.amount).toFixed(2)}</td>
          <td><i class="bi ${p.method === 'Card' ? 'bi-credit-card' : p.method === 'Cash' ? 'bi-cash' : 'bi-calendar3'} me-1 text-muted"></i>${p.method}</td>
          <td><small class="text-muted">${p.date}</small></td>
          <td><span class="status-badge completed">${p.status}</span></td>
        </tr>
      `).join('');
        }
    </script>
</body>

</html>
